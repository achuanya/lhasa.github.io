---
layout: default
---
<link rel="stylesheet" href="/assets//highlight/a11y-light.min.css?v={{ site.time | date: '%s' }}">
<article class="post-content">
  {% if content contains site.ARTICLEPICTURES_PATH %}
    {% assign images = content | split:'<img src="' %}
    {% for image in images %}
      {% if image contains site.ARTICLEPICTURES_PATH %}
        {% assign thumbSrc = image | split: '" ' | first %}
        {% assign imageSrc = thumbSrc | split: '?imageView' | first | remove: "_640v" | remove: "_640" %}
        {% assign newImage = thumbSrc | prepend: '" data-url="' | prepend: thumbSrc | append: '" data-src="' | append: imageSrc %}
        {% if thumbSrc contains site.ARTICLEPICTURES_PATH and newImage contains site.ARTICLEPICTURES_PATH %}
            {% assign content = content | replace: thumbSrc, newImage %}
        {% endif %}
      {% endif %}
    {% endfor %}
  {% endif %}
  {% assign content = content | replace_first:'id="markdown-toc"','class="post-toc"' %}
  {{ content }}
</article>
{% include info.html %}
<script src="/assets/img-previewer.min.js?v={{ site.time | date: '%s' }}"></script>
<script src="/assets/highlight/highlight.min.js?v={{ site.time | date: '%s' }}"></script>
<script>
  hljs.highlightAll();
</script>
<div id="comment"></div>
{% include wechat.html %}
