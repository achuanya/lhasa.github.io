name: Run Go Program

on:
  schedule:
    # 每天的 02:00、10:00 和 16:00 运行
    - cron: '0 2,10,16 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.22'

      - name: Run Go Program
        run: go run main.go
        env:
          # COS SecretID 和 SecretKey
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
